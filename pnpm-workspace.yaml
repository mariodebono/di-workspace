  "@types/node": "^24.12.4"
  "drizzle-orm": "^0.45.2"
  "electron": "^42.6.1"
  "electron-log": "^5.4.4"
  "i18next": "^26.3.0"
  "reflect-metadata": "^0.2.2"

  "vitest": "^4.1.10"
  "@biomejs/biome": "^2.5.3"
  "@vitest/coverage-v8": "^4.1.10"
  "publint": "^0.3.21"
  "tsdown": "^0.22.5"
  "@changesets/cli": "^2.31.0"
  "typescript": "^6.0.3"

catalogMode: prefer

minimumReleaseAgeExclude:
